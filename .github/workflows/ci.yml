name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  testar-sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Testar todo o SQL do repositório
        # Monta o banco de exemplo com SQLite e roda todos os gabaritos e scripts.
        run: python3 scripts/testar_sql.py
